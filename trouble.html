<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>トラブル対応 | heal</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: #f2f2f2;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #3a3a3a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .back {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .title {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .section {
      margin-top: 15px;
    }

    .section h3 {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .section p {
      font-size: 14px;
      margin: 3px 0;
    }

    .danger {
      margin-top: 10px;
      padding: 10px;
      background: #ffe5e5;
      border-left: 4px solid #ff4d4d;
      font-size: 13px;
    }

    .note {
      margin-top: 10px;
      padding: 10px;
      background: #fff3cd;
      border-left: 4px solid #ffcc00;
      font-size: 13px;
    }

  </style>
</head>

<body>

<header>
  <h1>トラブル対応</h1>
</header>

<div class="container">

  <a href="index.html" class="back">← 戻る</a>

  <!-- クレーム① -->
  <div class="card">

    <div class="title">チケット有効期限の認識違い</div>

    <div class="section">
      <h3>■ 状況</h3>
      <p>・お客様が「使用日から1年」と認識していた</p>
      <p>・実際は「初回使用日から1年」</p>
    </div>

    <div class="section">
      <h3>■ 原因</h3>
      <p>・有効期限の具体的な日付案内をしていなかった</p>
      <p>・使用可否のみの説明になっていた</p>
    </div>

    <div class="section">
      <h3>■ 対応方法</h3>
      <p>・正しい有効期限を説明する</p>
      <p>・必要に応じてPC画面を見せて説明</p>
    </div>

    <div class="danger">
      ・「使えます / 使えません」だけで終わらせない<br>
      ・有効期限の日付を必ず伝える
    </div>

    <div class="note">
      ・チケット利用時は毎回「期限」をセットで案内する<br>
      ・認識ズレをその場で防ぐ
    </div>

  </div>

</div>

</body>
</html>
